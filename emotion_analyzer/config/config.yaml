# 情感分析模型配置文件
project:
  name: "Speech Emotion Analyzer Pro"
  version: "2.0"

data:
  raw_dir: "RawData"
  processed_dir: "data/processed"
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

audio:
  sample_rate: 44100
  duration: 2.5  # 秒
  n_fft: 2048
  hop_length: 512

features:
  use_mfcc: true
  use_mel_spectrogram: true
  use_chroma: true
  use_zcr: true
  use_spectral_centroid: true
  n_mfcc: 13
  n_mel: 128

augmentation:
  enabled: true
  pitch_shift_range: [-2, 2]  # 半音
  time_stretch_range: [0.8, 1.2]
  noise_factor: 0.005
  gain_range: [-6, 6]  # dB

model:
  type: "hybrid_cnn_lstm"  # 选项: cnn, lstm, hybrid_cnn_lstm
  cnn_filters: [32, 64, 128]
  lstm_units: 128
  dropout: 0.3
  l2_regularization: 0.001

training:
  epochs: 100
  batch_size: 32
  learning_rate: 0.001
  optimizer: "adam"
  loss: "categorical_crossentropy"
  early_stopping_patience: 15
  validation_split: 0.2

emotions:
  classes:
    - "female_angry"
    - "female_calm"
    - "female_fearful"
    - "female_happy"
    - "female_sad"
    - "male_angry"
    - "male_calm"
    - "male_fearful"
    - "male_happy"
    - "male_sad"

visualization:
  generate_plots: true
  plot_format: "png"
  dpi: 150

paths:
  model_checkpoint: "saved_models/best_model.h5"
  model_weights: "saved_models/model_weights.h5"
  training_history: "logs/training_history.json"
  predictions_log: "logs/predictions.csv"
